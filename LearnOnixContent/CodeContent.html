<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>LearnOnix CodeContent</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../styles/CodeContent.css" />
</head>

<body>
  <div class="container">
    <header>
      <h1>📘 LearnOnix CodeContent</h1>
      <p class="tagline">Explore and practice code snippets by topic — HTML, CSS, JS, and more!</p>
    </header>

    <section class="filter">
      <label for="codeFilter">📂 Filter by Category:</label>
      <select id="codeFilter">
        <option value="All">All</option>
        <option value="HTML">HTML</option>
        <option value="CSS">CSS</option>
        <option value="JavaScript">JavaScript</option>
        <option value="React">React</option>
      </select>
    </section>

    <section id="codeList" class="code-list">
      <!-- Code cards injected by JS -->
    </section>

    <footer>
      <p>&copy; 2025 LearnOnix | Code Smarter, Not Harder 🚀</p>
    </footer>
  </div>

  <script src="../scripts/CodeContent.js"></script>
</body>

</html>
